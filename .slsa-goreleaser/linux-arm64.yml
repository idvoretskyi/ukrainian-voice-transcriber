version: 1
env:
  - CGO_ENABLED=0
flags:
  - -trimpath
goos: linux
goarch: arm64
main: ./cmd/voice-transcriber
binary: voice-transcriber-{{ .Os }}-{{ .Arch }}
ldflags:
  - "-w -s"
  - "-X main.version={{ .Env.VERSION }}"
  - "-X main.buildDate={{ .CommitDate }}"
  - "-X main.gitCommit={{ .FullCommit }}"
