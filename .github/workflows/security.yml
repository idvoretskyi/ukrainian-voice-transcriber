name: Security & Quality Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  GO_VERSION: '1.25.9'

jobs:
  # Go-based security scanners (gosec, govulncheck)
  security-analysis:
    name: Security Analysis (${{ matrix.tool }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: gosec
            output_format: sarif
            output_file: gosec-results.sarif
            command: gosec -fmt sarif -out gosec-results.sarif ./...
          - tool: govulncheck
            output_format: text
            output_file: ""
            command: govulncheck ./...

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Install ${{ matrix.tool }}
      run: |
        case "${{ matrix.tool }}" in
          gosec)
            go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
            echo "$HOME/go/bin" >> $GITHUB_PATH
            ;;
          govulncheck)
            go install golang.org/x/vuln/cmd/govulncheck@v1.2.0
            echo "$HOME/go/bin" >> $GITHUB_PATH
            ;;
        esac

    - name: Run ${{ matrix.tool }}
      run: ${{ matrix.command }}

    - name: Upload SARIF results
      if: matrix.output_format == 'sarif'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ matrix.output_file }}
        category: ${{ matrix.tool }}

  # Trivy vulnerability scanner (uses dedicated action, not go install)
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy SARIF results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-results.sarif
        category: trivy

  # CodeQL Analysis (separate due to special requirements)
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: go
        config-file: ./.github/codeql/codeql-config.yml

    - name: Build
      env:
        GOTOOLCHAIN: auto
      run: make build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:go"
        output: sarif-results
        upload: false

    - name: Filter SARIF results
      uses: advanced-security/filter-sarif@v1
      with:
        patterns: |
          -**/testdata/**
          -**/*_test.go
          -vendor/**
          -docs/**
          -*.md
        input: sarif-results/go.sarif
        output: sarif-results/go.sarif

    - name: Upload filtered SARIF results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: sarif-results/go.sarif

  # Dependency Review (PR only)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Dependency Review
      uses: actions/dependency-review-action@v5
      with:
        fail-on-severity: moderate
        comment-summary-in-pr: always